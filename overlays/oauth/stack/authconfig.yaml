apiVersion: authorino.kuadrant.io/v1beta3
kind: AuthConfig
metadata:
  name: apicurio-registry-protection
  namespace: kafka
spec:
  hosts:
    - apicurio-registry.127.0.0.1.nip.io
    - apicurio-registry.kafka.svc.cluster.local

  authentication:
    "keycloak":
      jwt:
        jwksUrl: http://keycloak.keycloak.svc.cluster.local:8080/realms/kafka-oauth/protocol/openid-connect/certs

  metadata:
    "keycloak-permissions":
      when:
        - predicate: "request.url_path.split('/').size() >= 6 && request.url_path.split('/')[4] == 'groups'"
      http:
        url: http://keycloak.keycloak.svc.cluster.local:8080/realms/kafka-oauth/protocol/openid-connect/token
        method: POST
        contentType: application/x-www-form-urlencoded
        headers:
          "Authorization":
            selector: request.headers.authorization
        bodyParameters:
          grant_type:
            value: "urn:ietf:params:oauth:grant-type:uma-ticket"
          audience:
            value: "apicurio-registry"
          permission:
            expression: "'group:' + request.url_path.split('/')[5].split('.')[0] + '#' + {'GET': 'read', 'HEAD': 'read', 'POST': 'write', 'PUT': 'write', 'DELETE': 'write'}[request.method]"
          response_mode:
            value: "decision"

  authorization:
    "check-permissions":
      opa:
        rego: |
          package registry_authz

          import rego.v1

          group_path if {
            parts := split(input.request.url_path, "/")
            parts[4] == "groups"
            count(parts) >= 6
          }

          allow if {
            input.auth.metadata["keycloak-permissions"].result == true
          }

          allow if {
            not group_path
          }
        allValues: true
